name: TaskManager CD

on:
  workflow_run:
    workflows: ["TaskManager CI"]
    types:
      - completed
    branches: [main, master]

jobs:
  deploy-and-release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        
      - name: Build and Push Images to GHCR
        run: |
          # Lowercase the repository name for Docker tagging
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          # Build and Tag
          docker build -t ghcr.io/$REPO_LOWER/backend:latest ./backend
          docker build -t ghcr.io/$REPO_LOWER/frontend:latest ./frontend
          docker build -t ghcr.io/$REPO_LOWER/nginx:latest ./nginx
          
          # Push to GHCR
          docker push ghcr.io/$REPO_LOWER/backend:latest
          docker push ghcr.io/$REPO_LOWER/frontend:latest
          docker push ghcr.io/$REPO_LOWER/nginx:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ### TaskManager Automated Release
            
            This release was automatically generated by the CD pipeline.
            This build was triggered because the CI (Tests) passed successfully.
            
            **Docker Images (GHCR):**
            - `ghcr.io/${{ github.repository_owner }}/task-backend:latest`
            - `ghcr.io/${{ github.repository_owner }}/task-frontend:latest`
            - `ghcr.io/${{ github.repository_owner }}/task-nginx:latest`
            
            Original CI Run: ${{ github.event.workflow_run.html_url }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
