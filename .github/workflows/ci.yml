name: TaskManager CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Linting & Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit
          
      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
          
      - name: Security check with Bandit
        run: |
          bandit -r backend -x backend/tests --severity-level high

  backend-tests:
    runs-on: ubuntu-latest
    needs: backend-quality
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: taskdb
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt
          
      - name: Run backend tests with Pytest
        env:
          DB_HOST: localhost
          DB_NAME: taskdb
          DB_USER: admin
          DB_PASSWORD: secret
          REDIS_HOST: localhost
          PYTHONPATH: .
        run: |
          pytest backend/tests

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install ESLint
        working-directory: frontend
        run: |
          npm init -y
          npm install eslint --save-dev
          
      - name: Run ESLint
        working-directory: frontend
        run: npx eslint app.js

  docker-smoke-test:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-quality]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build and Start Services with Docker Compose
        run: |
          docker compose up -d --build
          
      - name: Check container status
        run: docker compose ps
        
      - name: Test health endpoints
        run: |
          # Wait for backend to be ready via Nginx proxy (which maps port 80)
          sleep 15
          curl -f http://localhost:80/api/health || (docker compose logs && exit 1)
          
      - name: Cleanup
        run: docker compose down

  deploy-and-release:
    runs-on: ubuntu-latest
    needs: [docker-smoke-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        
      - name: Build and Push Images to GHCR
        run: |
          # Lowercase the repository name for Docker tagging
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          # Build and Tag
          docker build -t ghcr.io/$REPO_LOWER/backend:latest ./backend
          docker build -t ghcr.io/$REPO_LOWER/frontend:latest ./frontend
          docker build -t ghcr.io/$REPO_LOWER/nginx:latest ./nginx
          
          # Push to GHCR
          docker push ghcr.io/$REPO_LOWER/backend:latest
          docker push ghcr.io/$REPO_LOWER/frontend:latest
          docker push ghcr.io/$REPO_LOWER/nginx:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ### TaskManager Automated Release
            
            This release was automatically generated by the CD pipeline.
            
            **Docker Images (GHCR):**
            - `ghcr.io/${{ github.repository_owner }}/task-backend:latest`
            - `ghcr.io/${{ github.repository_owner }}/task-frontend:latest`
            - `ghcr.io/${{ github.repository_owner }}/task-nginx:latest`
            
            Build Run: ${{ github.run_id }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
